# Pyrefly configuration
# Scope analysis to real project source files only.

python_version = "3.11"
project_includes = ["app.py", "mcp_server.py"]
project_excludes = [
    "**/__pycache__/**",
    "**/__pyrefly_virtual__/**",
    "**/outputs/**",
    "**/models/**",
    "**/.git/**",
    "**/.venv/**",
    "**/*.ipynb",
]

[errors]
missing-import = "ignore"
